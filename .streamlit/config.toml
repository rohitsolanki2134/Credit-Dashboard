[theme]
base                   = "light"
primaryColor           = "#2274E0"
backgroundColor        = "#FFFFFF"
secondaryBackgroundColor = "#F0F7FF"
textColor              = "#0F172A"
font                   = "sans serif"

[server]
headless = true
# port and address are NOT set here — Streamlit Community Cloud manages these.
# Cloud Run overrides them via CLI args in the Dockerfile CMD.
